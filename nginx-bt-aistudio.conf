server {
    listen 80;
    server_name bt-aistudio.ru www.bt-aistudio.ru;

    return 301 https://bt-aistudio.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bt-aistudio.ru www.bt-aistudio.ru;

    ssl_certificate /etc/letsencrypt/live/bt-aistudio.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bt-aistudio.ru/privkey.pem;

    # Frontend - SPA fallback
    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Concierge assets (static files)
    location /concierge/assets/ {
        proxy_pass http://152.53.227.37:3001;
        proxy_set_header Host $host;
    }

    # Concierge Frontend
    location /concierge/ {
        proxy_pass http://152.53.227.37:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://152.53.227.37:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Concierge API
    location /concierge/api/ {
        proxy_pass http://152.53.227.37:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (FastAPI route is /api/v1/ws, not /ws)
    location /api/v1/ws {
        proxy_pass http://127.0.0.1:8000/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /concierge/api/v1/ws {
        proxy_pass http://127.0.0.1:8000/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location = /live {
        proxy_pass http://127.0.0.1:8000/live;
        proxy_set_header Host $host;
    }

    location = /concierge/live {
        proxy_pass http://127.0.0.1:8000/live;
        proxy_set_header Host $host;
    }

    # Backend health (FastAPI: /health — not under /api/)
    location = /concierge/health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /concierge/api/health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}