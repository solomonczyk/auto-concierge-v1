name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://bt-aistudio.ru' }}
          PLAYWRIGHT_ADMIN_USER: ${{ vars.PLAYWRIGHT_ADMIN_USER || 'admin' }}
          PLAYWRIGHT_ADMIN_PASS: ${{ secrets.PLAYWRIGHT_ADMIN_PASS }}
          PLAYWRIGHT_SLUG: ${{ vars.PLAYWRIGHT_SLUG || 'auto-concierge' }}
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
