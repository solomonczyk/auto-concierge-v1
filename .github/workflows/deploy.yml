# Production deploy: SSH to VPS, git sync, docker compose build/up, alembic.
# Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, optional DEPLOY_PORT, DEPLOY_PATH, DEPLOY_BRANCH
name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            export DEPLOY_BRANCH="${{ secrets.DEPLOY_BRANCH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            bash scripts/deploy-vps.sh
